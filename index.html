    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const videoId = getQueryParam('id');
            const videoContainer = document.getElementById('video-container');
            const skeleton = document.getElementById('video-skeleton');
            const currentUrl = window.location.href;
            const encodedUrl = encodeURIComponent(currentUrl);

            if (videoId) {
                const videoElement = document.createElement('video');
                videoElement.className = "w-full md:rounded-[12px] shadow-sm z-10 relative bg-black";
                videoElement.style.maxHeight = "520px";
                videoElement.style.outline = "none";
                videoElement.controls = true;
                
                // Disable Autoplay & Muted
                videoElement.autoplay = false; 
                videoElement.muted = false; 

                videoElement.playsInline = true;
                videoElement.setAttribute('webkit-playsinline', 'true');
                videoElement.preload = "auto";
                
                // Hide skeleton when video is ready
                videoElement.onloadedmetadata = () => {
                    if(skeleton) skeleton.style.display = 'none';
                };

                // Error Fallback
                videoElement.onerror = () => {
                    if(skeleton) skeleton.style.display = 'none';
                    videoContainer.innerHTML = `<div class="py-20 text-center text-gray-500 w-full bg-gray-50 md:rounded-[12px]"><p>Failed to load video. Refresh the page.</p></div>`;
                };

                videoElement.src = `https://cdn2.videy.co/${videoId}.mp4`;
                videoContainer.appendChild(videoElement);
            } else {
                if(skeleton) skeleton.style.display = 'none';
                videoContainer.innerHTML = `
                    <div class="py-20 text-center text-gray-500 w-full bg-gray-50 md:rounded-[12px]">
                        <p class="font-medium text-lg text-gray-800">Video not found</p>
                        <p class="text-sm">Please use a valid link.</p>
                    </div>
                `;
            }

            // Update Social Links
            document.getElementById('share-wa').href = `https://wa.me/?text=${encodedUrl}`;
            document.getElementById('share-tg').href = `https://t.me/share/url?url=${encodedUrl}`;
            document.getElementById('share-tw').href = `https://twitter.com/intent/tweet?url=${encodedUrl}`;
            document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
        });

        async function copyToClipboard() {
            const text = window.location.href;
            const copyText = document.getElementById('copy-text');
            
            try {
                await navigator.clipboard.writeText(text);
                copyText.innerText = "Copied!";
            } catch (err) {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = text;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                copyText.innerText = "Copied!";
            }
            setTimeout(() => { copyText.innerText = "Copy Video Link"; }, 2000);
        }
    </script>
